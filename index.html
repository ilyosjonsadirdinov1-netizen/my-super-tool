<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vazn Indeksi Kalkulyatori - Sog'lom Hayot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white p-8 rounded-3xl shadow-xl border border-emerald-100">
        <h1 class="text-3xl font-bold text-emerald-700 text-center mb-2">BMI Kalkulyator</h1>
        <p class="text-gray-500 text-center mb-8 text-sm">O'z vazningizni nazorat qiling</p>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Bo'yingiz (sm)</label>
                <input type="number" id="height" placeholder="Masalan: 175" class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Vazningiz (kg)</label>
                <input type="number" id="weight" placeholder="Masalan: 70" class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-emerald-500 focus:outline-none transition">
            </div>

            <button onclick="calculateBMI()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl transition shadow-lg transform active:scale-95">
                Hisoblash 📊
            </button>
        </div>

        <div id="result" class="mt-8 text-center hidden">
            <div class="text-4xl font-bold text-emerald-600 mb-2" id="bmiValue">0</div>
            <div class="text-lg font-semibold text-gray-700" id="bmiStatus">Holat</div>
            <p class="text-gray-500 text-sm mt-4 italic" id="bmiAdvice"></p>
        </div>

        <div class="mt-10 pt-6 border-t border-gray-100 text-[10px] text-gray-400 leading-relaxed text-center">
            BMI (Tana vazni indeksi) — bu inson vaznining uning bo'yiga mutanosibligini aniqlash uchun ishlatiladigan xalqaro o'lchovdir. Ushbu kalkulyator sizga ozg'inlik yoki ortiqcha vazn bor-yo'qligini aniqlashga yordam beradi.
        </div>
    </div>

    <script>
        function calculateBMI() {
            const h = document.getElementById('height').value;
            const w = document.getElementById('weight').value;
            const resDiv = document.getElementById('result');

            if(h > 0 && w > 0) {
                const bmi = (w / ((h/100) * (h/100))).toFixed(1);
                document.getElementById('bmiValue').innerText = bmi;
                
                let status = "";
                let advice = "";
                
                if(bmi < 18.5) { status = "Vazn yetishmaydi ⚠️"; advice = "Sizga biroz ko'proq kaloriya va to'g'ri ovqatlanish tavsiya etiladi."; }
                else if(bmi < 25) { status = "Sizning vazningiz ideal! ✅"; advice = "Ajoyib! Shu tarzda davom eting."; }
                else if(bmi < 30) { status = "Ortiqcha vazn ⚠️"; advice = "Jismoniy mashqlarni ko'paytirishingizni maslahat beramiz."; }
                else { status = "Semizlik 🚨"; advice = "Sog'lig'ingizga e'tiborli bo'ling, mutaxassis bilan maslahatlashing."; }

                document.getElementById('bmiStatus').innerText = status;
                document.getElementById('bmiAdvice').innerText = advice;
                resDiv.classList.remove('hidden');
            } else {
                alert("Iltimos, ma'lumotlarni to'g'ri kiriting!");
            }
        }
    </script>
</body>
</html>
