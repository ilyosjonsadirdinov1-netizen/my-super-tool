<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTool - Video Yuklovchi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans flex items-center justify-center min-h-screen p-4">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold text-center mb-6 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            SuperTool Uz
        </h1>
        
        <div class="space-y-4">
            <input type="text" id="urlInput" placeholder="Instagram yoki TikTok linki..." 
                   class="w-full p-4 rounded-xl bg-slate-700 border border-slate-600 focus:outline-none focus:border-cyan-500 transition text-white">
            
            <button onclick="downloadVideo()" id="btn" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl transition duration-300 shadow-lg">
                Yuklash ⚡️
            </button>
        </div>

        <div id="result" class="mt-6 text-center"></div>
        
        <div class="mt-8 text-xs text-slate-500 text-center leading-relaxed">
            <p class="mb-2">✅ Instagram Reels va TikTok videolarni yuklash.</p>
            <p>Google AdSense uchun maqola: Bizning servisimiz orqali siz ijtimoiy tarmoqlardagi videolarni sifatli va tezkor yuklab olishingiz mumkin. Bu 2026-yilning eng foydali instrumenti.</p>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('urlInput').value;
            const resDiv = document.getElementById('result');
            const btn = document.getElementById('btn');

            if(!url) {
                resDiv.innerHTML = "<p class='text-red-400'>Linkni kiriting!</p>";
                return;
            }

            btn.disabled = true;
            btn.innerText = "Qidirilmoqda...";
            resDiv.innerHTML = "<div class='animate-spin inline-block w-6 h-6 border-4 border-cyan-500 border-t-transparent rounded-full'></div>";

            try {
                // Bu dunyodagi eng barqaror bepul API'lardan biri
                const response = await fetch(https://api.vkr.com/api/v1/get?url=${encodeURIComponent(url)});
                const data = await response.json();

                if (data && data.url) {
                    resDiv.innerHTML = <a href="${data.url}" target="_blank" class="block bg-green-500 hover:bg-green-400 text-white font-bold py-3 rounded-xl transition shadow-lg">✅ Tayyor! Yuklab olish</a>;
                } else {
                    resDiv.innerHTML = "<p class='text-orange-400'>Video topilmadi. Boshqa link sinab ko'ring.</p>";
                }
            } catch (e) {
                resDiv.innerHTML = "<p class='text-red-400'>Xatolik: Server javob bermadi.</p>";
            } finally {
                btn.disabled = false;
                btn.innerText = "Yuklash ⚡️";
            }
        }
    </script>
</body>
</html>
